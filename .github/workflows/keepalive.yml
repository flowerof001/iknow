name: Uptime Keepalive

on:
  schedule:
    - cron: "*/5 * * * *"   # 每 5 分钟 ping 一次，防止 Render 休眠
  workflow_dispatch:          # 手动触发

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 30 --max-time 60 \
            https://iknow-pm-engine.onrender.com/health)
          echo "HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ iKnow is awake"
          else
            echo "⚠️ iKnow returned $STATUS (cold start or error)"
          fi

      - name: Warm frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --connect-timeout 30 --max-time 60 \
            https://iknow-pm-engine.onrender.com/)
          echo "Frontend HTTP $STATUS"
